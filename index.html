<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel = "stylesheet" href = "./css/style2.css">
</head>
<body>
    <div class="main-container">
         <h1>Weather</h1>
        <div class="container">
           
            <div class="searchCity">
                <input id = "cityInput" type = "text" placeholder = "Enter City Name">
                <span id = "clearInput">✖</span>
                <div id = "loader" class = "loader"></div>
                <button id = "search">Search</button>
            </div>
            
            <img id = "weatherIcon"  src = "">
            <div id="temperature">Temperature:</div>
    
            <div id = "condition">Condition:
            </div>
            <div id="feels">Feels Like:</div>
             <p id = "dateTime"></p>
             <div id = "rain">Precipitation chances:</div>
            <div id="humidity">Humidity:</div>
            <div id="wind"> Wind Speed:</div>
            <h2>3 Days Forecast:</h2>
            <div id = "forecast"></div>
            <h3>Recent Searches</h3>
            <div id = "history"></div>
            <button id = "clearHistory">Clear history</button>
        </div>
    </div>
    <script src = "./js/app.js"></script>
</body>
</html>
